name: Build POS Apps

on:
  workflow_dispatch:

jobs:
  build-mac:
    name: Build Mac DMG
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install --prefix apps/backend
      - run: npm install --prefix apps/renderer
      - run: npm --prefix apps/backend run prisma:generate
      - run: npm run build:backend
      - run: npm run build:renderer:ci
      - run: npm run prepare:backend-runtime
      - continue-on-error: true
        run: npm run release:size-report
      - run: DEBUG=electron-builder,electron-builder:* npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  build-win:
    name: Build Windows ZIP
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install --prefix apps/backend
      - run: npm install --prefix apps/renderer
      - run: npm --prefix apps/backend run prisma:generate
      - run: npm run build:backend
      - run: npm run build:renderer:ci
      - run: npm run prepare:backend-runtime
      - continue-on-error: true
        run: npm run release:size-report
      - shell: pwsh
        run: |
          Write-Host "START BUILD $(Get-Date -Format o)"
          Write-Host "COMMAND: npx electron-builder --win --x64 --publish never"
          $env:DEBUG = "electron-builder,electron-builder:*"
          & npx electron-builder --win --x64 --publish never
          $exitCode = $LASTEXITCODE
          Write-Host "END BUILD $(Get-Date -Format o) exit code: $exitCode"
          if ($exitCode -ne 0) {
            throw "Windows ZIP build failed. Command: npx electron-builder --win --x64 --publish never. Exit code: $exitCode"
          }
      - if: always()
        continue-on-error: true
        run: npm run release:size-report
      - if: always()
        shell: pwsh
        run: dir dist-electron
      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist-electron/*.zip
          if-no-files-found: error
