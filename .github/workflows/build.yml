name: Build POS Installers

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install --prefix apps/backend
      - run: npm install --prefix apps/renderer
      - run: npm --prefix apps/backend run prisma:generate
      - run: npm run build:backend
      - run: npm run build:renderer
      - run: DEBUG=electron-builder,electron-builder:* npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install --prefix apps/backend
      - run: npm install --prefix apps/renderer
      - run: npm --prefix apps/backend run prisma:generate
      - run: npm run build:backend
      - run: npm run build:renderer
      - shell: pwsh
        run: |
          $env:DEBUG = "electron-builder,electron-builder:*"
          npx electron-builder --win --x64 --publish never
      - shell: pwsh
        run: dir dist-electron
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe
