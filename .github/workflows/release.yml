name: Release POS Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix apps/backend

      - name: Install renderer dependencies
        run: npm install --prefix apps/renderer

      - name: Generate Prisma client
        run: npm --prefix apps/backend run prisma:generate

      - name: Create packaged SQLite template database
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force apps/backend/prisma/prisma
          $env:DATABASE_URL = "file:./prisma/prisma/pos.db"
          npm --prefix apps/backend run prisma:migrate:prod

      - name: Build backend
        run: npm run build:backend

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Windows installer
        shell: pwsh
        run: |
          $env:DEBUG = "electron-builder,electron-builder:*"
          npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Windows artifacts
        shell: pwsh
        run: dir dist-electron

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe
          if-no-files-found: error
          retention-days: 90

  build-macos:
    name: Build Mac Installer
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix apps/backend

      - name: Install renderer dependencies
        run: npm install --prefix apps/renderer

      - name: Generate Prisma client
        run: npm --prefix apps/backend run prisma:generate

      - name: Create packaged SQLite template database
        run: |
          mkdir -p apps/backend/prisma/prisma
          DATABASE_URL=file:./prisma/prisma/pos.db npm --prefix apps/backend run prisma:migrate:prod

      - name: Build backend
        run: npm run build:backend

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Mac installer
        run: DEBUG=electron-builder,electron-builder:* npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
          if-no-files-found: error
          retention-days: 90

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: POS System ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          body: |
            POS System ${{ github.ref_name }}

            Downloads:
            - Windows: download the `.exe` installer.
            - macOS: download the `.dmg` file.

            Security note:
            - This build is unsigned unless code signing certificates are configured.
            - Windows may show a SmartScreen warning.
            - macOS may show an unidentified developer warning.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
