name: Release POS Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Portable EXE
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps
        run: npm install

      - name: Install backend deps
        run: npm install --prefix apps/backend

      - name: Install renderer deps
        run: npm install --prefix apps/renderer

      - name: Generate Prisma
        run: npm --prefix apps/backend run prisma:generate

      - name: Build backend
        run: npm run build:backend

      - name: Build renderer
        run: npm run build:renderer:ci

      - name: Prepare backend runtime
        run: npm run prepare:backend-runtime

      - name: Print pre-package size report
        run: npm run release:size-report

      - name: Build Windows portable EXE
        shell: pwsh
        run: |
          Write-Host "START BUILD $(Get-Date -Format o)"
          Write-Host "COMMAND: npx electron-builder --win --x64 --publish never"
          $env:DEBUG = "electron-builder,electron-builder:*"
          & npx electron-builder --win --x64 --publish never
          $exitCode = $LASTEXITCODE
          Write-Host "END BUILD $(Get-Date -Format o) exit code: $exitCode"
          if ($exitCode -ne 0) {
            throw "Windows portable build failed. Command: npx electron-builder --win --x64 --publish never. Exit code: $exitCode"
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print post-package size report
        if: always()
        run: npm run release:size-report

      - name: Check Windows artifacts
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "dist-electron") {
            dir dist-electron
          } else {
            Write-Host "dist-electron folder does not exist"
          }

          $exeFiles = Get-ChildItem "dist-electron" -Filter "*.exe" -File -ErrorAction SilentlyContinue
          if ($exeFiles) {
            Write-Host "Portable EXE artifacts:"
            $exeFiles
          } else {
            Write-Host "No Windows portable EXE found in dist-electron"
          }

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist-electron/*.exe
          if-no-files-found: error
          retention-days: 90

  build-macos:
    name: Build Mac DMG
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps
        run: npm install

      - name: Install backend deps
        run: npm install --prefix apps/backend

      - name: Install renderer deps
        run: npm install --prefix apps/renderer

      - name: Generate Prisma
        run: npm --prefix apps/backend run prisma:generate

      - name: Build backend
        run: npm run build:backend

      - name: Build renderer
        run: npm run build:renderer:ci

      - name: Prepare backend runtime
        run: npm run prepare:backend-runtime

      - name: Print pre-package size report
        run: npm run release:size-report

      - name: Build Mac DMG
        run: |
          echo "START BUILD $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "COMMAND: npx electron-builder --mac --publish never"
          DEBUG=electron-builder,electron-builder:* npx electron-builder --mac --publish never
          echo "END BUILD $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
          if-no-files-found: error
          retention-days: 90

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: release-assets

      - name: Download Mac DMG
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: POS System ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          body: |
            POS System ${{ github.ref_name }}

            Downloads:
            - Windows: download the portable `.exe`.
            - macOS: download the `.dmg` file.

            Security note:
            - This build is unsigned unless code signing certificates are configured.
            - Windows may show a SmartScreen warning.
            - macOS may show an unidentified developer warning.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
