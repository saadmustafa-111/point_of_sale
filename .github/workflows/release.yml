name: Release POS Installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix apps/backend

      - name: Install renderer dependencies
        run: npm ci --prefix apps/renderer

      - name: Generate Prisma client
        run: npm --prefix apps/backend run prisma:generate

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest*.yml
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix apps/backend

      - name: Install renderer dependencies
        run: npm ci --prefix apps/renderer

      - name: Generate Prisma client
        run: npm --prefix apps/backend run prisma:generate

      - name: Build macOS DMG
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.blockmap
            dist-electron/latest*.yml
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: POS System ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          body: |
            POS System ${{ github.ref_name }}

            Downloads:
            - Windows: download the `.exe` installer.
            - macOS: download the `.dmg` file.

            Security note:
            - This build is not code signed unless signing certificates are configured in GitHub Actions.
            - Windows may show a SmartScreen warning.
            - macOS may show an unidentified developer warning.

            For professional public distribution, configure Windows and macOS code signing later.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
