name: Release POS Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Portable EXE
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix apps/backend

      - name: Install renderer dependencies
        run: npm install --prefix apps/renderer

      - name: Generate Prisma client
        run: npm --prefix apps/backend run prisma:generate

      - name: Build backend
        run: npm run build:backend

      - name: Build renderer
        run: npm run build:renderer

      - name: Prune backend dev dependencies
        run: npm prune --omit=dev --prefix apps/backend

      - name: Check package input sizes
        shell: pwsh
        run: |
          function Show-PathSize($Path) {
            if (Test-Path $Path) {
              $bytes = (Get-ChildItem $Path -Recurse -Force -File | Measure-Object Length -Sum).Sum
              $mb = [Math]::Round(($bytes / 1MB), 2)
              Write-Host "$Path size: $mb MB"
            } else {
              Write-Host "$Path missing"
            }
          }

          Show-PathSize "apps/backend/node_modules"
          Show-PathSize "apps/backend/dist"
          Show-PathSize "apps/renderer/dist"
          $backendNodeModuleFiles = (Get-ChildItem "apps/backend/node_modules" -Recurse -Force -File | Measure-Object).Count
          Write-Host "apps/backend/node_modules file count: $backendNodeModuleFiles"

      - name: Report largest backend dependency folders
        shell: pwsh
        run: |
          Write-Host "Top 20 largest package folders inside apps/backend/node_modules"
          $packages = @()
          Get-ChildItem "apps/backend/node_modules" -Directory -Force | ForEach-Object {
            if ($_.Name.StartsWith("@")) {
              $packages += Get-ChildItem $_.FullName -Directory -Force
            } else {
              $packages += $_
            }
          }

          $packages |
            ForEach-Object {
              $bytes = (Get-ChildItem $_.FullName -Recurse -Force -File | Measure-Object Length -Sum).Sum
              [PSCustomObject]@{
                SizeMB = [Math]::Round(($bytes / 1MB), 2)
                Path = $_.FullName.Replace((Get-Location).Path + "\", "")
              }
            } |
            Sort-Object SizeMB -Descending |
            Select-Object -First 20 |
            Format-Table -AutoSize

      - name: Build Windows portable EXE
        shell: pwsh
        run: |
          Write-Host "START BUILD"
          Write-Host "COMMAND: npx electron-builder --win --x64 --publish never"
          $env:DEBUG = "electron-builder,electron-builder:*"
          & npx electron-builder --win --x64 --publish never
          $exitCode = $LASTEXITCODE
          Write-Host "END BUILD exit code: $exitCode"
          if ($exitCode -ne 0) {
            throw "Windows portable build failed. Command: npx electron-builder --win --x64 --publish never. Exit code: $exitCode"
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Windows artifacts
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "dist-electron") {
            dir dist-electron
          } else {
            Write-Host "dist-electron folder does not exist"
          }

          $expected = "dist-electron/POS-System-1.0.0-win-x64-portable.exe"
          if (Test-Path $expected) {
            Write-Host "Found expected portable EXE: $expected"
          } else {
            Write-Host "Expected portable EXE missing: $expected"
            Write-Host "Available EXE files:"
            Get-ChildItem "dist-electron" -Filter "*.exe" -File -ErrorAction SilentlyContinue
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist-electron/*.exe
          if-no-files-found: error
          retention-days: 90

  build-macos:
    name: Build Mac Installer
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix apps/backend

      - name: Install renderer dependencies
        run: npm install --prefix apps/renderer

      - name: Generate Prisma client
        run: npm --prefix apps/backend run prisma:generate

      - name: Build backend
        run: npm run build:backend

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Mac installer
        run: DEBUG=electron-builder,electron-builder:* npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
          if-no-files-found: error
          retention-days: 90

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: release-assets

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: POS System ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          body: |
            POS System ${{ github.ref_name }}

            Downloads:
            - Windows: download the portable `.exe`.
            - macOS: download the `.dmg` file.

            Security note:
            - This build is unsigned unless code signing certificates are configured.
            - Windows may show a SmartScreen warning.
            - macOS may show an unidentified developer warning.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
