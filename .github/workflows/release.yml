name: Release POS Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      npm_config_cache: ${{ github.workspace }}\.npm-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps
        run: npm install

      - name: Install backend deps
        run: npm install --prefix apps/backend

      - name: Install renderer deps
        run: npm install --prefix apps/renderer

      - name: Generate Prisma
        run: npm --prefix apps/backend run prisma:generate

      - name: Build backend
        run: npm run build:backend

      - name: Build renderer
        run: npm run build:renderer:ci

      - name: Prepare backend runtime
        run: npm run prepare:backend-runtime

      - name: Print pre-package size report
        continue-on-error: true
        run: node scripts/print-release-size-report.mjs

      - name: Build Windows ZIP
        shell: pwsh
        run: |
          Write-Host "START BUILD $(Get-Date -Format o)"
          Write-Host "COMMAND: npm run build:win"
          $env:DEBUG = "electron-builder,electron-builder:*"
          & npm run build:win
          $exitCode = $LASTEXITCODE
          Write-Host "END BUILD $(Get-Date -Format o) exit code: $exitCode"
          if ($exitCode -ne 0) {
            throw "Windows ZIP build failed. Command: npm run build:win. Exit code: $exitCode"
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print post-package size report
        if: always()
        continue-on-error: true
        run: node scripts/print-release-size-report.mjs

      - name: Check Windows artifacts
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "dist-electron") {
            dir dist-electron
          } else {
            Write-Host "dist-electron folder does not exist"
          }

          $zip = Get-ChildItem "dist-electron/*.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($zip) {
            Write-Host "Windows ZIP is ready:"
            Write-Host $zip.FullName
          } else {
            Write-Host "Windows ZIP is missing"
          }

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist-electron/*.zip
          if-no-files-found: error
          compression-level: 9
          retention-days: 90

  build-macos:
    name: Build Mac DMG
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps
        run: npm install

      - name: Install backend deps
        run: npm install --prefix apps/backend

      - name: Install renderer deps
        run: npm install --prefix apps/renderer

      - name: Generate Prisma
        run: npm --prefix apps/backend run prisma:generate

      - name: Build backend
        run: npm run build:backend

      - name: Build renderer
        run: npm run build:renderer:ci

      - name: Prepare backend runtime
        run: npm run prepare:backend-runtime

      - name: Print pre-package size report
        continue-on-error: true
        run: npm run release:size-report

      - name: Build Mac DMG
        run: |
          echo "START BUILD $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "COMMAND: npx electron-builder --mac --publish never"
          DEBUG=electron-builder,electron-builder:* npx electron-builder --mac --publish never
          echo "END BUILD $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
          if-no-files-found: error
          retention-days: 90

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: release-assets

      - name: Download Mac DMG
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: POS System ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          body: |
            POS System ${{ github.ref_name }}

            Downloads:
            - Windows: download the `.zip`, extract it, then run `POS System.exe`.
            - macOS: download the `.dmg` file.

            Security note:
            - This build is unsigned unless code signing certificates are configured.
            - Windows may show a SmartScreen warning.
            - macOS may show an unidentified developer warning.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
